<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="아진 영단어" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#7C3AED" />
  <title>아진이의 영단어 📚</title>
  <link rel="stylesheet" href="./assets/styles.css" />
</head>
<body>

<!-- ===== LOADING SCREEN ===== -->
<div id="loading-screen" class="loading-screen">
  <div class="loading-spinner"></div>
  <p style="color: var(--text-light); font-size: 15px;">단어를 불러오는 중...</p>
</div>

<!-- ===== APP (hidden until loaded) ===== -->
<div id="app" style="display:none; flex-direction:column; min-height:100dvh;">

  <!-- Header (hidden during study) -->
  <header class="app-header">
    <span class="header-title">📚 아진이의 영단어</span>
    <span class="header-right" id="header-right"></span>
  </header>

  <!-- ======================== HOME SCREEN ======================== -->
  <main id="screen-home" class="screen">
    <!-- Greeting -->
    <div>
      <div class="home-greeting">안녕, <span>아진</span>! 👋</div>
      <div class="home-date" id="home-date"></div>
    </div>

    <!-- Streak banner -->
    <div class="streak-banner">
      <div class="streak-fire">🔥</div>
      <div class="streak-text">
        <strong id="streak-count">0</strong>
        <span id="streak-msg">오늘 첫 시작이에요!</span>
      </div>
    </div>

    <!-- Today's study card -->
    <div class="today-card">
      <div class="today-card-title">오늘의 학습</div>
      <div class="today-stats">
        <div class="today-stat">
          <div class="stat-num" id="today-new-count">0</div>
          <div class="stat-label">새 단어</div>
        </div>
        <div class="today-stat">
          <div class="stat-num" id="today-review-count">0</div>
          <div class="stat-label">복습 단어</div>
        </div>
      </div>
      <button class="btn-start" id="btn-start-study">📚 오늘 학습 시작하기</button>
      <div class="session-done-msg" id="session-done-msg" style="display:none;"></div>
    </div>

    <!-- Overall progress -->
    <div class="total-progress">
      <div class="progress-label">
        <span>전체 학습 진행도</span>
        <span id="progress-pct-text">0 / 100</span>
      </div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progress-bar-fill" style="width: 0%"></div>
      </div>
    </div>
  </main>

  <!-- ======================== STUDY SCREEN ======================== -->
  <div id="screen-study" class="screen">
    <!-- Study-specific header -->
    <div class="study-header">
      <button class="study-close-btn" id="study-close-btn" aria-label="학습 나가기">✕</button>
      <div class="study-progress-bar">
        <div class="study-progress-fill" id="study-progress-fill" style="width:0%"></div>
      </div>
      <div class="study-counter" id="study-counter">0/0</div>
    </div>
    <!-- Dynamic content injected here -->
    <div class="study-content" id="study-content"></div>
  </div>

  <!-- ======================== WORD LIST SCREEN ======================== -->
  <main id="screen-wordlist" class="screen">
    <div>
      <div class="section-title">단어장 📖</div>
      <div class="section-subtitle" id="wordlist-count">학습한 단어 0개</div>
    </div>
    <input
      type="search"
      class="wordlist-search"
      id="wordlist-search"
      placeholder="🔍 단어 또는 뜻 검색..."
      autocomplete="off"
      autocorrect="off"
      spellcheck="false"
    />
    <div class="wordlist-items" id="wordlist-items">
      <div class="empty-state">
        <div class="empty-icon">📚</div>
        <p>아직 학습한 단어가 없어요.<br>오늘 학습을 시작해봐요!</p>
      </div>
    </div>
  </main>

  <!-- ======================== WRONG NOTES SCREEN ======================== -->
  <main id="screen-wrong" class="screen">
    <div>
      <div class="section-title">오답노트 ❌</div>
      <div class="section-subtitle" id="wrong-count">틀린 적 있는 단어 0개</div>
    </div>
    <button class="btn-retry-all" id="btn-retry-wrong-all" style="display:none;">
      🔄 틀린 단어 전체 다시 풀기
    </button>
    <div class="wordlist-items" id="wrong-items">
      <div class="empty-state">
        <div class="empty-icon">✨</div>
        <p>오답노트가 비어있어요!<br>틀린 단어가 없어요. 대단해요!</p>
      </div>
    </div>
  </main>

  <!-- ======================== STATS SCREEN ======================== -->
  <main id="screen-stats" class="screen">
    <div>
      <div class="section-title">학습 현황 📊</div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="sc-icon">📚</div>
        <div class="sc-num" id="stat-learned">0</div>
        <div class="sc-label">학습한 단어</div>
      </div>
      <div class="stat-card">
        <div class="sc-icon">🔥</div>
        <div class="sc-num" id="stat-streak">0</div>
        <div class="sc-label">연속 학습일</div>
      </div>
      <div class="stat-card">
        <div class="sc-icon">📅</div>
        <div class="sc-num" id="stat-due">0</div>
        <div class="sc-label">오늘 복습 필요</div>
      </div>
      <div class="stat-card">
        <div class="sc-icon">✏️</div>
        <div class="sc-num" id="stat-attempts">0</div>
        <div class="sc-label">총 풀이 횟수</div>
      </div>
    </div>

    <!-- Accuracy -->
    <div class="accuracy-card">
      <div class="accuracy-title">전체 정확도</div>
      <div class="accuracy-bar-track">
        <div class="accuracy-bar-fill" id="accuracy-bar-fill" style="width: 0%"></div>
      </div>
      <div class="accuracy-pct" id="stat-accuracy">0%</div>
    </div>

    <!-- Progress -->
    <div class="total-progress">
      <div class="progress-label">
        <span>전체 학습 진행도</span>
        <span id="stats-progress-text">0 / 100</span>
      </div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="stats-progress-fill" style="width: 0%"></div>
      </div>
    </div>

    <!-- Reset data (bottom, subtle) -->
    <div style="text-align:center; margin-top: 8px;">
      <button
        id="btn-reset"
        style="font-size:12px; color: var(--text-light); padding: 8px 16px; border-radius: 20px; background: var(--surface2);"
        aria-label="학습 데이터 초기화"
      >
        ⚠️ 학습 기록 초기화
      </button>
    </div>
  </main>

  <!-- ======================== BOTTOM NAVIGATION ======================== -->
  <nav class="bottom-nav" role="navigation" aria-label="메인 메뉴">
    <button class="nav-btn active" data-screen="home" aria-label="홈">
      <span class="nav-icon">🏠</span>
      <span>홈</span>
    </button>
    <button class="nav-btn" data-screen="wordlist" aria-label="단어장">
      <span class="nav-icon">📖</span>
      <span>단어장</span>
    </button>
    <button class="nav-btn" data-screen="wrong" aria-label="오답노트">
      <span class="nav-icon">❌</span>
      <span>오답노트</span>
    </button>
    <button class="nav-btn" data-screen="stats" aria-label="통계">
      <span class="nav-icon">📊</span>
      <span>현황</span>
    </button>
  </nav>

</div><!-- /#app -->

<!-- ======================== WORD DETAIL MODAL ======================== -->
<div class="modal-overlay hidden" id="word-modal" role="dialog" aria-modal="true" aria-label="단어 상세">
  <div class="modal-sheet" id="modal-sheet"></div>
</div>

<!-- Scripts -->
<script src="./assets/srs.js"></script>
<script src="./assets/tts.js"></script>
<script src="./assets/app.js"></script>

<script>
  // Reset button (stats screen)
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('btn-reset')?.addEventListener('click', () => {
      if (confirm('⚠️ 모든 학습 기록이 삭제됩니다.\n정말 초기화할까요?')) {
        Object.values({
          PROGRESS: 'ajin_progress_v2',
          SESSION:  'ajin_session_v2',
          SETTINGS: 'ajin_settings_v2',
          STREAK:   'ajin_streak_v2'
        }).forEach(k => localStorage.removeItem(k));
        location.reload();
      }
    });
  });
</script>

</body>
</html>
