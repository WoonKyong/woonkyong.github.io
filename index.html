<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a1a2e" />
  <title>WoonKyong</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f1a;
      --card-bg: #1a1a2e;
      --card-hover: #22223b;
      --border: rgba(255,255,255,0.08);
      --text: #f0f0f5;
      --text-sub: #9090a8;
      --radius: 16px;

      --travel:  #f97316;
      --finance: #22c55e;
      --english: #7c3aed;
      --etc:     #06b6d4;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ===== HEADER ===== */
    header {
      padding: 28px 24px 0;
    }
    .site-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .site-title span { color: var(--english); }

    /* ===== MAIN ===== */
    main {
      flex: 1;
      padding: 32px 20px 48px;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
    }

    .page-heading {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .page-sub {
      color: var(--text-sub);
      font-size: 14px;
      margin-bottom: 32px;
    }

    /* ===== CATEGORY GRID ===== */
    .categories {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .category-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 20px;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: background 0.2s, transform 0.15s, border-color 0.2s;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .category-card:hover {
      background: var(--card-hover);
      transform: translateY(-2px);
      border-color: var(--accent);
    }
    .category-card:active { transform: translateY(0); }

    .card-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      background: color-mix(in srgb, var(--accent) 18%, transparent);
    }
    .card-name {
      font-size: 18px;
      font-weight: 700;
    }
    .card-desc {
      font-size: 13px;
      color: var(--text-sub);
      line-height: 1.5;
    }
    .card-count {
      margin-top: auto;
      font-size: 12px;
      color: var(--accent);
      font-weight: 600;
    }

    /* accent per category */
    .cat-travel  { --accent: var(--travel);  }
    .cat-finance { --accent: var(--finance); }
    .cat-english { --accent: var(--english); }
    .cat-etc     { --accent: var(--etc);     }

    /* ===== ITEMS SECTION ===== */
    .section {
      margin-top: 40px;
      display: none;
    }
    .section.active { display: block; }

    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .section-back {
      background: none;
      border: none;
      color: var(--text-sub);
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
      padding: 4px;
    }
    .section-title {
      font-size: 20px;
      font-weight: 700;
    }

    .item-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .item-link {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 18px;
      text-decoration: none;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 14px;
      transition: background 0.2s, border-color 0.2s;
    }
    .item-link:hover {
      background: var(--card-hover);
      border-color: rgba(255,255,255,0.15);
    }
    .item-emoji { font-size: 22px; flex-shrink: 0; }
    .item-info { flex: 1; }
    .item-name { font-size: 15px; font-weight: 600; }
    .item-desc { font-size: 12px; color: var(--text-sub); margin-top: 2px; }
    .item-arrow { color: var(--text-sub); font-size: 14px; }

    .empty-msg {
      color: var(--text-sub);
      font-size: 14px;
      text-align: center;
      padding: 32px 0;
    }

    /* ===== FOOTER ===== */
    footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: var(--text-sub);
      border-top: 1px solid var(--border);
    }

    @media (max-width: 400px) {
      .categories { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="site-title">WK<span>.</span></div>
</header>

<main>
  <!-- Category grid -->
  <div id="home">
    <h1 class="page-heading">안녕하세요 👋</h1>
    <p class="page-sub">카테고리를 선택하세요</p>

    <div class="categories">
      <a class="category-card cat-travel" href="#travel" onclick="showSection('travel'); return false;">
        <div class="card-icon">✈️</div>
        <div class="card-name">여행</div>
        <div class="card-desc">여행 관련 도구 및 정보</div>
        <div class="card-count" id="count-travel"></div>
      </a>

      <a class="category-card cat-finance" href="#finance" onclick="showSection('finance'); return false;">
        <div class="card-icon">💰</div>
        <div class="card-name">금융</div>
        <div class="card-desc">금융 계산 및 관리 도구</div>
        <div class="card-count" id="count-finance"></div>
      </a>

      <a class="category-card cat-english" href="#english" onclick="showSection('english'); return false;">
        <div class="card-icon">📚</div>
        <div class="card-name">영어</div>
        <div class="card-desc">영어 학습 도구</div>
        <div class="card-count" id="count-english"></div>
      </a>

      <a class="category-card cat-etc" href="#etc" onclick="showSection('etc'); return false;">
        <div class="card-icon">🛠️</div>
        <div class="card-name">기타</div>
        <div class="card-desc">그 외 유용한 도구들</div>
        <div class="card-count" id="count-etc"></div>
      </a>
    </div>
  </div>

  <!-- Travel section -->
  <div class="section" id="section-travel">
    <div class="section-header">
      <button class="section-back" onclick="showHome()">←</button>
      <span class="card-icon" style="--accent:var(--travel)">✈️</span>
      <span class="section-title">여행</span>
    </div>
    <div class="item-list" id="items-travel">
      <a class="item-link" href="./travel-matsuyama-2026.html">
        <span class="item-emoji">🇯🇵</span>
        <div class="item-info">
          <div class="item-name">마쓰야마 3박 4일 (2026.06)</div>
          <div class="item-desc">준비물 체크리스트 · 일정표 · 타이메시 팁</div>
        </div>
        <span class="item-arrow">›</span>
      </a>
    </div>
  </div>

  <!-- Finance section -->
  <div class="section" id="section-finance">
    <div class="section-header">
      <button class="section-back" onclick="showHome()">←</button>
      <span class="card-icon" style="--accent:var(--finance)">💰</span>
      <span class="section-title">금융</span>
    </div>
    <div class="item-list" id="items-finance">
      <p class="empty-msg">준비 중입니다 🚧</p>
    </div>
  </div>

  <!-- English section -->
  <div class="section" id="section-english">
    <div class="section-header">
      <button class="section-back" onclick="showHome()">←</button>
      <span class="card-icon" style="--accent:var(--english)">📚</span>
      <span class="section-title">영어</span>
    </div>
    <div class="item-list" id="items-english">
      <a class="item-link" href="./english-vocab.html">
        <span class="item-emoji">📖</span>
        <div class="item-info">
          <div class="item-name">아진이의 영단어</div>
          <div class="item-desc">중1 영단어 학습 앱</div>
        </div>
        <span class="item-arrow">›</span>
      </a>
    </div>
  </div>

  <!-- Etc section -->
  <div class="section" id="section-etc">
    <div class="section-header">
      <button class="section-back" onclick="showHome()">←</button>
      <span class="card-icon" style="--accent:var(--etc)">🛠️</span>
      <span class="section-title">기타</span>
    </div>
    <div class="item-list" id="items-etc">
      <p class="empty-msg">준비 중입니다 🚧</p>
    </div>
  </div>
</main>

<footer>© 2026 WoonKyong</footer>

<script>
  const ITEMS = {
    travel:  [{ name: '마쓰야마 3박 4일 (2026.06)', desc: '준비물 체크리스트 · 일정표 · 타이메시 팁', emoji: '🇯🇵', href: './travel-matsuyama-2026.html' }],
    finance: [],
    english: [{ name: '아진이의 영단어', desc: '중1 영단어 학습 앱', emoji: '📖', href: './english-vocab.html' }],
    etc:     [],
  };

  // Update counts on cards
  Object.entries(ITEMS).forEach(([cat, list]) => {
    const el = document.getElementById('count-' + cat);
    if (el) el.textContent = list.length > 0 ? `${list.length}개` : '';
  });

  function showSection(cat) {
    document.getElementById('home').style.display = 'none';
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById('section-' + cat).classList.add('active');
    window.scrollTo(0, 0);
    location.hash = cat;
  }

  function showHome() {
    document.getElementById('home').style.display = '';
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    window.scrollTo(0, 0);
    history.pushState('', document.title, window.location.pathname);
  }

  // Handle direct URL with hash
  const hash = location.hash.replace('#', '');
  if (['travel', 'finance', 'english', 'etc'].includes(hash)) {
    showSection(hash);
  }
</script>

</body>
</html>
